<!DOCTYPE html>

<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tandon Air</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
            text-align: center;
        }

        header {
            background: #2c7be5;
            color: white;
            padding: 15px;
            font-size: 22px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }

        .card {
            background: white;
            width: 280px;
            margin: 12px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .value {
            font-size: 34px;
            color: #2c7be5;
        }

        .status {
            font-size: 20px;
            font-weight: bold;
        }

        .statusBox {
            margin-top: 8px;
            font-weight: bold;
        }

        button {
            padding: 10px 18px;
            margin: 8px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .on {
            background: green;
            color: white;
        }

        .off {
            background: red;
            color: white;
        }

        .emg {
            background: orange;
            color: white;
        }

        .reset {
            background: gray;
            color: white;
        }

        canvas {
            max-width: 900px;
            margin: 20px auto;
        }
    </style>

</head>

<body>

    <header>🌱 Smart Greenhouse - Tandon Air</header>

    <div class="container">

        ```
        <div class="card">
            <h3>Level Air</h3>
            <div class="value" id="level">0%</div>
        </div>

        <div class="card">
            <h3>Debit Air</h3>
            <div class="value" id="flow">0 L/min</div>
        </div>

        <div class="card">
            <h3>Kualitas Air</h3>
            <div class="value" id="ppm">0 ppm</div>
        </div>

        <div class="card">
            <h3>Status Pompa</h3>
            <div class="status" id="status">OFF</div>

            <button class="on" onclick="pompaOn()">ON</button>
            <button class="off" onclick="pompaOff()">OFF</button>

            <br>

            <button class="emg" onclick="emergencyOn()">EMERGENCY</button>
            <button class="reset" onclick="resetEmergency()">RESET</button>

            <div class="statusBox" id="emergencyStatus">NORMAL</div>
        </div>
        ```

    </div>

    <h3>Grafik Level Air</h3>
    <canvas id="levelChart"></canvas>

    <h3>Grafik Debit Air</h3>
    <canvas id="flowChart"></canvas>

    <h3>Grafik Kualitas Air</h3>
    <canvas id="ppmChart"></canvas>

    <script>

        // ================= STATE =================
        let level = 0;
        let flow = 0;
        let ppm = 0;
        let pompa = false;
        let emergency = true;

        // ================= DATA GRAFIK =================
        let labels = [];
        let levelData = [];
        let flowData = [];
        let ppmData = [];

        // ================= CHART =================
        const levelChart = new Chart(document.getElementById("levelChart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Level Air (%)",
                    data: levelData,
                    borderWidth: 2,
                    tension: 0.3
                }]
            }
        });

        const flowChart = new Chart(document.getElementById("flowChart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Debit Air (L/min)",
                    data: flowData,
                    borderWidth: 2,
                    tension: 0.3
                }]
            }
        });
        const ppmChart = new Chart(document.getElementById("ppmChart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Kualitas Air (ppm)",
                    data: ppmData,
                    borderWidth: 2,
                    tension: 0.3
                }]
            }
        });

        // ================= KONTROL =================
        function pompaOn() {
            if (!emergency) {
                pompa = true;
            }
        }

        function pompaOff() {
            pompa = false;
        }

        function emergencyOn() {
            emergency = true;
            pompa = false; // paksa mati
        }

        function resetEmergency() {
            emergency = false;
        }

        // ================= SISTEM =================
        function updateSystem() {

            // PRIORITAS TERTINGGI: EMERGENCY
            if (emergency) {
                pompa = false;
            }

            // POMPA HIDUP
            else if (pompa) {
                level += 5;
                flow += 2.5;
                ppm += 75;

                if (level >= 80) {
                    level = 80;
                    flow = 40;
                    ppm = 1200;
                    pompa = false; // auto stop
                }
            }

            // POMPA MATI
            else {
                level -= 5;
                flow -= 2.5;
                ppm -= 75;

                if (level <= 20) {
                    level += 5;
                    flow += 2.5;
                    ppm += 75;
                    pompa = true;
                }
            }

            // ================= UPDATE UI =================
            document.getElementById("level").innerText = level + "%";
            document.getElementById("flow").innerText = flow + " L/min";
            document.getElementById("ppm").innerText = ppm + " ppm";

            document.getElementById("status").innerText = pompa ? "ON" : "OFF";
            document.getElementById("status").style.color = pompa ? "green" : "red";

            document.getElementById("emergencyStatus").innerText =
                emergency ? "EMERGENCY AKTIF" : "NORMAL";
            document.getElementById("emergencyStatus").style.color =
                emergency ? "orange" : "green";

            // ================= UPDATE GRAFIK =================
            let waktu = new Date().toLocaleTimeString();

            labels.push(waktu);
            levelData.push(level);
            flowData.push(flow);
            ppmData.push(ppm);

            if (labels.length > 12) {
                labels.shift();
                levelData.shift();
                flowData.shift();
                ppmData.shift();
            }

            levelChart.update();
            flowChart.update();
            ppmChart.update();
        }

        // update tiap 2 detik
        setInterval(updateSystem, 2000);

    </script>

</body>
</html>
