<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Smart Greenhouse Dashboard</title>

<!-- Chart.js -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    text-align: center;
}

h1 {
    background: green;
    color: white;
    padding: 15px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 20px;
    margin: 10px;
    width: 250px;
    border-radius: 15px;
}

.value {
    font-size: 30px;
    color: #2c7be5;
}
</style>

</head>

<body>

<h1>🌱 Smart Greenhouse Monitoring</h1>

<div class="container">
    <div class="card">
        <h3>Level Air</h3>
        <div class="value" id="level">0%</div>
    </div>

```
<div class="card">
    <h3>Debit Air</h3>
    <div class="value" id="flow">0 L/min</div>
</div>
```

</div>

<h3>Grafik Level Air</h3>
<canvas id="levelChart"></canvas>

<h3>Grafik Debit Air</h3>
<canvas id="flowChart"></canvas>

<script>

// ================= FIREBASE CONFIG =================
// GANTI DENGAN PUNYA KAMU
var firebaseConfig = {
  apiKey: "AIzaSyDqHkPiJvYkYWECR-kBbuHtoqwcNSKuOQ4",
  authDomain: "smart-green-house-96fc7.firebaseapp.com",
  databaseURL: "https://smart-green-house-96fc7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smart-green-house-96fc7",
  storageBucket: "smart-green-house-96fc7.firebasestorage.app",
  messagingSenderId: "1086068447907",
  appId: "1:1086068447907:web:01cd8d0d0d863671643d16"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ================= DATA =================
let labels = [];
let levelData = [];
let flowData = [];

// ================= CHART =================
const levelChart = new Chart(document.getElementById("levelChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Level Air (%)",
            data: levelData,
            borderWidth: 2
        }]
    }
});

const flowChart = new Chart(document.getElementById("flowChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Debit Air (L/min)",
            data: flowData,
            borderWidth: 2
        }]
    }
});

// ================= AMBIL DATA DARI FIREBASE =================
db.ref("greenhouse").on("value", function(snapshot) {

    let data = snapshot.val();

    if (data) {
        document.getElementById("level").innerText = data.level + "%";
        document.getElementById("flow").innerText = data.flow + " L/min";

        let waktu = new Date().toLocaleTimeString();

        labels.push(waktu);
        levelData.push(data.level);
        flowData.push(data.flow);

        if (labels.length > 10) {
            labels.shift();
            levelData.shift();
            flowData.shift();
        }

        levelChart.update();
        flowChart.update();
    }
});

// ================= SIMULASI DATA =================
// (HAPUS NANTI KALAU SUDAH PAKAI ESP32)
setInterval(() => {

    let level = Math.floor(Math.random() * 100);
    let flow = Math.floor(Math.random() * 20);

 db.ref("greenhouse").set({
    level: level,
    flow: flow
});

}, 3000);

</script>

</body>
</html>
